{% extends "sqladmin/layout.html" %}
{% from 'sqladmin/_macros.html' import render_form_fields %}
{% block content %}
<div class="col-12">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">新增{{ model_view.name }}</h3>
    </div>
    <div class="card-body border-bottom py-3">
      <form id="create-form" action="{{ url_for('admin:create', identity=model_view.identity) }}" method="POST"
        enctype="multipart/form-data">
        <div class="row">
          {% if error %}
          <div class="alert alert-danger" role="alert">{{ error }}</div>
          {% endif %}
        </div>
        <fieldset class="form-fieldset">
          {{ render_form_fields(form, form_opts=form_opts) }}
        </fieldset>
        <div class="row mt-3">
          <div class="col-md-2">
            <a href="{{ url_for('admin:list', identity=model_view.identity) }}" class="btn">
              取消
            </a>
          </div>
          <div class="col-md-4">
            <button type="button" id="btn-save" class="btn btn-primary">保存</button>
            <span id="save-feedback" style="margin-left:12px;display:none;color:#2fb344;font-weight:500;">✓ 保存成功</span>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block tail %}
<script>
$(function() {
  $('#btn-save').on('click', function() {
    var $btn = $(this);
    $btn.prop('disabled', true).text('保存中…');
    var form = document.getElementById('create-form');
    var formData = new FormData(form);
    formData.set('save', 'Save');
    fetch(form.action, {
      method: 'POST',
      body: formData,
      redirect: 'manual',
      credentials: 'same-origin'
    }).then(function(resp) {
      $btn.prop('disabled', false).text('保存');
      if (resp.ok || resp.status === 302 || resp.type === 'opaqueredirect') {
        $('#save-feedback').fadeIn(200).delay(2000).fadeOut(400);
      } else {
        resp.text().then(function(t) {
          alert('保存失败（' + resp.status + '），请检查表单内容。');
        });
      }
    }).catch(function(err) {
      $btn.prop('disabled', false).text('保存');
      alert('网络错误，请重试。');
    });
  });
});
</script>
{% endblock %}
