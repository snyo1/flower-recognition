<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/tabler.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/tabler-icons.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/fontawesome.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/select2.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/flatpickr.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('admin:statics', path='css/main.css') }}">
  {% if admin.favicon_url %}
  <link rel="icon" href="{{ admin.favicon_url }}">
  {% endif %}
  {% block head %}
  {% endblock %}
  <title>{{ admin.title }}</title>
</head>

<body>
  {% block body %}
  <main>
    {% block main %}
    {% endblock %}
  </main>
  {% endblock %}
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/jquery.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/tabler.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/popper.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/bootstrap.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/select2.full.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/flatpickr.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('admin:statics', path='js/main.js') }}"></script>
  <script>
  $(function(){

    // ===== 禁用搜索框的 keyup 自动搜索（main.js 会在输入1秒后自动触发，改为只点按钮才搜索）=====
    $(document).off('keyup', '#search-input');

    // ===== 1. select option 枚举值翻译 =====
    var enumOptionMap = {
      'active':     '正常',
      'disabled':   '已禁用',
      'draft':      '草稿',
      'pending':    '待审核',
      'published':  '已发布',
      'approved':   '已通过',
      'rejected':   '已拒绝',
      'processing': '处理中',
      'resolved':   '已解决',
      'closed':     '已关闭',
      'user':       '普通用户',
      'expert':     '专家',
      'admin':      '管理员',
      'register':   '注册',
      'reset':      '重置密码',
    };

    function translateSelectOptions() {
      $('select option').each(function() {
        var val = $(this).val();
        if (enumOptionMap[val] !== undefined) {
          $(this).text(enumOptionMap[val]);
        }
      });
      $('.select2-selection__rendered').each(function() {
        var txt = $(this).attr('title') || $(this).text().trim();
        if (enumOptionMap[txt] !== undefined) {
          $(this).text(enumOptionMap[txt]);
        }
      });
    }
    translateSelectOptions();

    $(document).on('select2:open', function() {
      setTimeout(function() {
        $('.select2-results__option').each(function() {
          var txt = $(this).text().trim();
          if (enumOptionMap[txt] !== undefined) {
            $(this).text(enumOptionMap[txt]);
          }
        });
      }, 80);
    });

    // ===== 2. "+ New XXX" 按钮中文化 =====
    $('a.btn').each(function() {
      var txt = $(this).text().trim();
      if (/^\+\s*New\s+/.test(txt)) {
        var name = txt.replace(/^\+\s*New\s+/, '').trim();
        $(this).html('<svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg> 添加新' + name);
      }
    });

    // ===== 3. 删除确认弹窗正文中文化 =====
    function translateDeleteModalText() {
      var $txt = $('#modal-delete-text');
      if (!$txt.length) return;
      var t = $txt.text().trim();
      if (t.indexOf('This will permanently delete') !== -1) {
        var match = t.match(/This will permanently delete\s+(.+?)[\.\?]?\s*$/);
        var target = match ? match[1].replace(/[\.\?]+$/, '').trim() : '';
        $txt.text(target ? '此操作将永久删除「' + target + '」，无法撤销。' : '此操作将永久删除该记录，无法撤销。');
      } else if (t.indexOf('Are you sure') !== -1) {
        $txt.text(t
          .replace(/Are you sure you want to delete these \d+ items\?/, '确定要删除选中的记录吗？此操作不可撤销。')
          .replace(/Are you sure you want to delete this item\?/, '确定要删除此记录吗？此操作不可撤销。')
          .replace(/Are you sure you want to delete[^?]*\?/, '确定要删除此记录吗？此操作不可撤销。')
        );
      }
    }

    $(document).on('show.bs.modal shown.bs.modal', '#modal-delete', function() {
      setTimeout(translateDeleteModalText, 50);
      setTimeout(translateDeleteModalText, 200);
    });

    // ===== 4. 图标按钮 title 翻译 =====
    var titleMap = { 'View': '查看详情', 'Edit': '编辑', 'Delete': '删除' };
    $('[title]').each(function() {
      var ti = $(this).attr('title');
      if (titleMap[ti]) $(this).attr('title', titleMap[ti]);
    });

    // ===== 5. 搜索框 placeholder 翻译（保留字段名提示）=====
    // SQLAdmin 生成格式：placeholder="Search: username, email"
    // 翻译为：可搜索：username、email
    $('input#search-input').each(function() {
      var ph = $(this).attr('placeholder') || '';
      if (ph.indexOf('Search:') === 0) {
        var fields = ph.replace(/^Search:\s*/, '').trim();
        $(this).attr('placeholder', '可搜索：' + fields);
      }
    });
    $('input[placeholder="Enter value"]').attr('placeholder', '请输入值');

    // ===== 6. 搜索 / 重置按钮 =====
    $('#search-button').text('搜索');
    $('#search-reset').attr('title', '清除搜索');

    // ===== 7. 导出按钮 =====
    $('a:contains("Export"), button:contains("Export")').each(function() {
      if ($(this).text().trim() === 'Export') $(this).text('导出');
    });

    // ===== 8. Actions 下拉按钮 & 批量操作选项 =====
    $('button#dropdownMenuButton').each(function() {
      var t = $(this).text().trim();
      if (t === 'Actions' || t.indexOf('Actions') === 0) $(this).text('批量操作');
    });
    $('a#action-delete').each(function() {
      if ($(this).text().indexOf('Delete selected') !== -1) $(this).text('删除选中项');
    });

    // ===== 9. 分页区域翻译 =====
    $('p.m-0.text-muted').each(function() {
      var html = $(this).html();
      if (html.indexOf('Showing') !== -1) {
        html = html
          .replace('Showing ', '显示第 ')
          .replace(/ to\s*\n?\s*<span>/, ' 到 <span>')
          .replace(/<\/span> of <span>/, '</span>，共 <span>')
          .replace(/<\/span> items/, '</span> 条');
        $(this).html(html);
      }
    });
    $('div.dropdown.text-muted').each(function() {
      var html = $(this).html();
      if (html.indexOf('Show') !== -1 && html.indexOf('/ Page') !== -1) {
        html = html.replace(/\bShow\b/, '每页显示').replace(/\/ Page/g, ' 条');
        $(this).html(html);
      }
    });
    $('div.dropdown-menu a.dropdown-item').each(function() {
      var t = $(this).text().trim();
      if (/^\d+ \/ Page$/.test(t)) {
        $(this).text(t.replace(' / Page', ' 条/页'));
      }
    });

    // ===== 10. 退出登录按钮（layout 模板已直接写中文，这里作兜底）=====
    $('a').filter(function() { return $(this).text().trim() === 'Logout'; }).text('退出登录');

    // ===== 11. form label 翻译 =====
    var labelMap = {
      'Username':          '用户名',
      'Password':          '密码',
      'Password Hash':     '密码（留空则不修改）',
      'Email':             '邮箱',
      'Role':              '角色',
      'Status':            '状态',
      'Recognitions':      '识别记录',
      'Comments':          '评论',
      'Feedbacks':         '反馈',
      'Qa Histories':      '问答历史',
      'Expert Application':'专家申请',
      'Profile':           '用户资料',
      'Name':              '名称',
      'Family':            '科属',
      'Color':             '颜色',
      'Blooming Period':   '花期',
      'Description':       '描述',
      'Care Guide':        '养护指南',
      'Flower Language':   '花语',
      'Plant Type':        '类型',
      'Tags':              '标签',
      'Is Active':         '是否活跃',
      'Is Corrected':      '已纠错',
      'Image Url':         '图片地址',
      'Plant Id':          '花卉ID',
      'User Id':           '用户ID',
      'Corrected Plant Id':'纠正花卉ID',
      'Reply Content':     '回复内容',
      'Processed At':      '处理时间',
      'Proof Material':    '证明材料',
      'Registration Date': '注册日期',
      'Last Login At':     '上次登录',
      'Last Login Ip':     '上次登录IP',
      'Created At':        '创建时间',
      'Updated At':        '更新时间',
      'Flower Id':         '花卉ID',
      'Comment Id':        '评论ID',
      'Admin Id':          '管理员ID',
      'Action':            '操作类型',
      'Target Type':       '目标类型',
      'Target Id':         '目标ID',
      'Details':           '操作详情',
      'Ip Address':        'IP地址',
      'Code':              '验证码',
      'Type':              '类型',
      'Expires At':        '过期时间',
      'Is Used':           '已使用',
      'Question':          '提问内容',
      'Answer':            '回答内容',
      'Content':           '内容',
      'Confidence':        '置信度',
    };
    $('label.form-label').each(function() {
      var txt = $(this).text().trim();
      if (labelMap[txt]) $(this).text(labelMap[txt]);
    });

    // ===== 12. 登录页 =====
    $('h2.card-title').each(function() {
      var txt = $(this).text().trim();
      if (txt.indexOf('Login to') === 0) $(this).text('登录 花世界后台管理');
    });
    $('button[type=submit]').each(function() {
      if ($(this).text().trim() === 'Login') $(this).text('登录');
    });

    // ===== 13. 表单页面标题 =====
    $('h3.card-title').each(function() {
      var txt = $(this).text().trim();
      if (txt.indexOf('New ') === 0) {
        $(this).text('添加新' + txt.substring(4));
      } else if (txt.indexOf('Edit ') === 0) {
        $(this).text('编辑：' + txt.substring(5));
      }
    });

    // ===== 14. Go Back 按钮 =====
    $('a.btn').filter(function() { return $(this).text().trim() === 'Go Back'; }).text('← 返回列表');

    // ===== 15. Filters 侧边栏 =====
    $('div.card-header h3').filter(function() { return $(this).text().trim() === 'Filters'; }).text('筛选条件');
    $('[placeholder="Apply Filter"]').attr('placeholder', '应用筛选');
    $('button').filter(function(){ return $(this).text().trim() === 'Apply Filter'; }).text('应用筛选');

    // ===== 16. [Clear] 筛选清除 =====
    $('a').filter(function() { return $(this).text().trim() === '[Clear]'; }).text('[清除]');

    // ===== 17. 分页 prev/next =====
    // SQLAdmin 生成结构：<a class="page-link"><i class="...chevron-left"></i>prev</a>
    $('a.page-link').each(function() {
      var $a = $(this);
      // 只替换文本节点，不动 <i> 图标
      $a.contents().filter(function() {
        return this.nodeType === 3; // 文本节点
      }).each(function() {
        this.textContent = this.textContent
          .replace(/\bprev\b/g, '上一页')
          .replace(/\bnext\b/g, '下一页');
      });
    });

    // ===== 18. 详情预览页 Edit / Delete 按钮 =====
    $('a.btn, button.btn').each(function() {
      var $el = $(this);
      $el.contents().filter(function() {
        return this.nodeType === 3;
      }).each(function() {
        var t = this.textContent.trim();
        if (t === 'Edit') this.textContent = this.textContent.replace('Edit', '编辑');
        if (t === 'Delete') this.textContent = this.textContent.replace('Delete', '删除');
      });
    });

    // ===== 19. 详情预览页列标题翻译（th） =====
    $('table th').each(function() {
      var t = $(this).text().trim();
      if (labelMap[t]) $(this).text(labelMap[t]);
    });

    // ===== 20. 详情页 td 枚举值翻译（仅翻译纯枚举值，跳过用户名等真实内容）=====
    // 只在 detail 页（包含 .datagrid 或 table.table-vcenter）中翻译 td 内容
    // 通过列标题跳过用户/管理员列，防止用户名或管理员名为 "user" / "admin" 时被误翻译
    $('table.table td').each(function() {
      if ($(this).children().length > 0) return; // 跳过有子元素的（含 HTML 的）
      var t = $(this).text().trim();
      if (enumOptionMap[t] === undefined) return;
      // 获取当前列的列号
      var colIdx = $(this).index();
      // 找同行的 th（通过 thead）
      var $thead = $(this).closest('table').find('thead tr');
      var thText = $thead.find('th').eq(colIdx).text().trim();
      var skipEnumColumns = ['用户名', 'Username', '用户', 'User', '反馈用户', '管理员', 'Admin'];
      if (skipEnumColumns.indexOf(thText) !== -1) return;
      $(this).text(enumOptionMap[t]);
    });

  });
  </script>
  {% block tail %}
  {% endblock %}
</body>

</html>
